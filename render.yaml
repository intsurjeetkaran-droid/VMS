services:
  # ── Backend API (Node.js Web Service) ─────────────────────────────────────
  - type: web
    name: vms-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is auto-assigned by Render — do NOT set it manually
      - key: MONGO_URI
        sync: false          # Set in Render dashboard → Environment
      - key: JWT_SECRET
        sync: false          # Set in Render dashboard → Environment
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        value: https://vms-frontend-2us4.onrender.com

  # ── Frontend (Static Site) ────────────────────────────────────────────────
  - type: web
    name: vms-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # This tells Vite where the backend API is during build
      - key: VITE_API_URL
        value: https://vms-c7m6.onrender.com/api
    routes:
      # SPA fallback — all routes serve index.html for React Router
      - type: rewrite
        source: /*
        destination: /index.html
